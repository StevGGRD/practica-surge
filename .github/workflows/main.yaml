name: Despliegue Automatico a Surge

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar Surge
      run: npm install -g surge

    - name: Desplegar en Surge.sh
      run: surge ./ stev-surge-practica.surge.sh --token abab13c414618cba5af9c1be061ec5ed
