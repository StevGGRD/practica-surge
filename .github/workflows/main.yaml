name: Despliegue Automatico a Surge

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar Surge
      run: npm install -g surge

    - name: Desplegar en Surge.sh
      run: |
        surge ./ stev-surge-practica.surge.sh --token 616db69b3df94879b69b2b5a5b5a2b5a
